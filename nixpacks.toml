# Nixpacks config for Railway
# System libraries required by Puppeteer's bundled Chromium

[phases.setup]
aptPkgs = [
    "libnss3",
    "libatk-bridge2.0-0",
    "libdrm2",
    "libxkbcommon0",
    "libgbm1",
    "libasound2",
    "libatspi2.0-0",
    "libxshmfence1",
    "libx11-xcb1",
    "fonts-liberation"
]

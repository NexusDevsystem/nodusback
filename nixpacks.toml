# Nixpacks config for Railway
# Installs Chromium dependencies required by Puppeteer

[phases.setup]
aptPkgs = [
    "chromium",
    "fonts-liberation",
    "libatk-bridge2.0-0",
    "libatk1.0-0",
    "libcups2",
    "libdbus-1-3",
    "libdrm2",
    "libgbm1",
    "libnspr4",
    "libnss3",
    "libx11-xcb1",
    "libxcomposite1",
    "libxdamage1",
    "libxrandr2",
    "xdg-utils",
    "libu2f-udev",
    "libvulkan1"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
